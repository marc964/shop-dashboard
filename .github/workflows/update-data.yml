name: Update Dashboard Data

on:
  schedule:
    - cron: '*/15 * * * 1-5'  # Every 15 min, weekdays only

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data pipeline
        env:
          HARVEST_ACCOUNT_ID: ${{ secrets.HARVEST_ACCOUNT_ID }}
          HARVEST_TOKEN: ${{ secrets.HARVEST_TOKEN }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          PTO_CALENDAR_URL: ${{ secrets.PTO_CALENDAR_URL }}
          SHOP_CALENDAR_URL: ${{ secrets.SHOP_CALENDAR_URL }}
        run: python pipeline/generate_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update dashboard data [automated]"
            git push
          fi
